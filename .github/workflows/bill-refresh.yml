name: Daily Bill Pipeline

on:
  schedule:
    # 11:00 UTC = 7:00 AM ET, every day
    # Day A (even day-of-year): refresh bills 1-200
    # Day B (odd day-of-year): refresh bills 201+ + discover + auto-triage
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      phase:
        description: "Which phase to run manually"
        required: true
        default: "day_a"
        type: choice
        options:
          - day_a
          - day_b

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests supabase anthropic

      - name: Determine phase
        id: phase
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "phase=${{ inputs.phase }}" >> $GITHUB_OUTPUT
          else
            # Alternate by day-of-year: even = day_a, odd = day_b
            DOY=$(date -u +%j)
            if [ $((10#$DOY % 2)) -eq 0 ]; then
              echo "phase=day_a" >> $GITHUB_OUTPUT
            else
              echo "phase=day_b" >> $GITHUB_OUTPUT
            fi
          fi

      # Day A: Refresh top 200 bills by confidence
      - name: Refresh bills 1-200
        if: steps.phase.outputs.phase == 'day_a'
        run: python scripts/refresh_bill_status.py --limit 200 --offset 0

      # Day B: Refresh remaining bills (201+) + discover + auto-triage
      - name: Refresh bills 201+
        if: steps.phase.outputs.phase == 'day_b'
        run: python scripts/refresh_bill_status.py --limit 240 --offset 200

      - name: Discover new bills
        if: steps.phase.outputs.phase == 'day_b'
        run: python scripts/openstates_monitor.py

      - name: Auto-triage and update issues
        if: steps.phase.outputs.phase == 'day_b'
        run: python scripts/auto_triage.py
